name: Deploy Web to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare
        working-directory: apps/web
        run: |
          # .env.production から NEXT_PUBLIC_* を自動読み込み
          pnpm exec opennextjs-cloudflare build

      - name: Deploy to Cloudflare Workers
        working-directory: apps/web
        run: |
          # .env.production から変数を読み込んで wrangler に渡す
          set -a && source .env.production && set +a
          pnpm exec wrangler deploy \
            --var NEXT_PUBLIC_SUPABASE_URL:$NEXT_PUBLIC_SUPABASE_URL \
            --var NEXT_PUBLIC_SUPABASE_ANON_KEY:$NEXT_PUBLIC_SUPABASE_ANON_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
